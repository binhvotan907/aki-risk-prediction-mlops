# Chay toan bo he thong AKI Risk Prediction:
# PostgreSQL, pgAdmin, MLflow, FastAPI backend, React frontend,
# Prometheus va Grafana.

services:
  postgres:
    image: postgres:15
    container_name: aki_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aki_mlops
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aki_mlops"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: aki_backend:latest
    container_name: aki_backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/aki_mlops
      SECRET_KEY: docker-demo-secret-key
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      MODEL_DIR: model/lightgbm
      MLFLOW_TRACKING_URI: http://mlflow:5000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./model:/app/model
      - ./data:/app/data
      - ./reports:/app/reports
      - ./mlops:/app/mlops

  seed:
    image: aki_backend:latest
    container_name: aki_seed
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/aki_mlops
      SECRET_KEY: docker-demo-secret-key
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      MODEL_DIR: model/lightgbm
      MLFLOW_TRACKING_URI: http://mlflow:5000
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
    volumes:
      - ./model:/app/model
      - ./data:/app/data
      - ./reports:/app/reports
      - ./mlops:/app/mlops
    command: ["python", "app/seed.py"]

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000
    container_name: aki_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: aki_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.11.1
    container_name: aki_mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlflow_data:/mlflow
    working_dir: /mlflow
    command:
      - mlflow
      - server
      - "--backend-store-uri"
      - "sqlite:////mlflow/mlflow.db"
      - "--default-artifact-root"
      - "/mlflow/mlruns"
      - "--serve-artifacts"
      - "--artifacts-destination"
      - "/mlflow/mlruns"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "5000"
      - "--workers"
      - "1"

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: aki_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:11.3.1
    container_name: aki_grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
    depends_on:
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  postgres_data:
  pgadmin_data:
  prometheus_data:
  grafana_data:

project_name: aki-risk-mlops
model_name: LightGBM
model_version: v1.0.0
random_state: 42
target_col: label

data:
  train_path: data/train_dataset_final.parquet
  val_path: data/val_dataset_final.parquet
  test_path: data/test_dataset_final.parquet
  features_path: data/features_dataset_final.json

output:
  model_dir: model/lightgbm
  reports_dir: reports

mlflow:
  enabled: true
  tracking_uri: http://localhost:5000
  experiment_name: aki-risk-prediction
  run_name: lightgbm-v1.0.0

threshold_tuning:
  metric: f1_score
  start: 0.10
  stop: 0.90
  step: 0.05

lightgbm:
  n_estimators: 300
  learning_rate: 0.05
  max_depth: -1
  num_leaves: 31
  subsample: 0.8
  colsample_bytree: 0.8
  objective: binary
  class_weight: balanced
  n_jobs: -1
